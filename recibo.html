<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recibo — YONKER EL TRIANGULO</title>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f1f5f9; min-height: 100vh; padding: 16px; }
    .wrapper { max-width: 640px; margin: 0 auto; }

    .receipt { background: #fff; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,.1); overflow: hidden; margin-bottom: 16px; }

    .header { background: linear-gradient(135deg, #4c1d95, #7c3aed); color: #fff; padding: 28px 24px 22px; text-align: center; }
    .header .logo { font-size: 2rem; margin-bottom: 4px; }
    .header h1 { font-size: 1.35rem; font-weight: 900; letter-spacing: 1px; }
    .header h2 { font-size: .85rem; font-weight: 400; opacity: .85; margin-top: 2px; }
    .header .folio { display: inline-block; margin-top: 12px; background: rgba(255,255,255,.15); border: 1px solid rgba(255,255,255,.3); border-radius: 20px; padding: 4px 16px; font-size: .78rem; letter-spacing: .5px; }

    .status-bar { padding: 10px 24px; font-size: .82rem; font-weight: 700; text-align: center; letter-spacing: .3px; }
    .status-diag { background: #fef3c7; color: #92400e; }
    .status-rep   { background: #dbeafe; color: #1e40af; }
    .status-listo { background: #dcfce7; color: #15803d; }
    .status-entr  { background: #f3f4f6; color: #374151; }

    .section { padding: 16px 24px 0; }
    .section:last-of-type { padding-bottom: 20px; }
    .section-title { font-size: .7rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: #7c3aed; background: #f3f0ff; border-left: 4px solid #7c3aed; padding: 5px 10px; border-radius: 0 6px 6px 0; margin-bottom: 12px; }
    .field { display: flex; justify-content: space-between; align-items: flex-start; padding: 7px 0; border-bottom: 1px dashed #e5e7eb; gap: 12px; }
    .field:last-child { border-bottom: none; }
    .field .lbl { color: #6b7280; font-size: .82rem; flex-shrink: 0; }
    .field .val { font-size: .85rem; font-weight: 600; color: #1f2937; text-align: right; word-break: break-word; }

    .price-box { margin: 16px 24px; background: linear-gradient(135deg, #f0fdf4, #dcfce7); border: 2px solid #16a34a; border-radius: 12px; padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; }
    .price-box .lbl { font-size: .9rem; font-weight: 700; color: #15803d; }
    .price-box .val { font-size: 1.8rem; font-weight: 900; color: #15803d; }

    /* ── CLÁUSULAS ── */
    .clausulas { margin: 0 16px 16px; background: #fffbeb; border: 2px solid #f59e0b; border-radius: 12px; padding: 16px 18px; }
    .clausulas-title { font-size: .82rem; font-weight: 800; color: #92400e; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
    .clausula { display: flex; gap: 8px; align-items: flex-start; margin-bottom: 8px; font-size: .8rem; color: #78350f; line-height: 1.5; }
    .clausula:last-child { margin-bottom: 0; }
    .clausula .num { background: #f59e0b; color: #fff; font-weight: 800; border-radius: 50%; width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; font-size: .68rem; flex-shrink: 0; margin-top: 1px; }

    /* ── FIRMA DIGITAL ── */
    .firma-section { margin: 0 16px 16px; background: #fff; border: 2px solid #e5e7eb; border-radius: 12px; padding: 18px; }
    .firma-section.signed { border-color: #16a34a; background: #f0fdf4; }
    .firma-title { font-size: .82rem; font-weight: 700; color: #374151; margin-bottom: 4px; }
    .firma-subtitle { font-size: .75rem; color: #6b7280; margin-bottom: 14px; line-height: 1.5; }
    #sigCanvas { display: block; width: 100%; height: 160px; border: 2px dashed #c4b5fd; border-radius: 10px; cursor: crosshair; background: #fafafa; touch-action: none; }
    #sigCanvas.active-sig { border-color: #7c3aed; border-style: solid; }
    .sig-actions { display: flex; gap: 8px; margin-top: 10px; }
    .btn-clear { flex: 1; padding: 9px; border: 1px solid #e5e7eb; border-radius: 8px; background: #f9fafb; color: #6b7280; font-weight: 600; font-size: .82rem; cursor: pointer; }
    .btn-confirm { flex: 2; padding: 9px; border: none; border-radius: 8px; background: #7c3aed; color: #fff; font-weight: 700; font-size: .84rem; cursor: pointer; }
    .btn-confirm:disabled { background: #c4b5fd; cursor: not-allowed; }
    .signed-badge { display: flex; align-items: center; gap: 10px; background: #dcfce7; border-radius: 10px; padding: 12px 14px; }
    .signed-badge .icon { font-size: 1.6rem; }
    .signed-badge .text { font-size: .82rem; color: #15803d; font-weight: 600; line-height: 1.4; }
    #firmaPreview { display: none; margin-top: 10px; border: 1px solid #e5e7eb; border-radius: 8px; max-width: 100%; }

    .footer { background: #f8fafc; border-top: 1px solid #e5e7eb; padding: 14px 24px; text-align: center; font-size: .75rem; color: #9ca3af; line-height: 1.7; }

    .actions { display: flex; gap: 10px; margin-bottom: 24px; }
    .actions button { flex: 1; padding: 12px; border: none; border-radius: 10px; font-size: .88rem; font-weight: 700; cursor: pointer; }
    .btn-print { background: #7c3aed; color: #fff; }
    .btn-wa    { background: #25d366; color: #fff; }

    .error-box { text-align: center; padding: 60px 20px; background: #fff; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,.1); }
    .error-box .icon { font-size: 3rem; margin-bottom: 12px; }
    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #1e293b; color: #fff; padding: 12px 24px; border-radius: 10px; font-size: .85rem; font-weight: 600; z-index: 9999; opacity: 0; transition: opacity .3s; pointer-events: none; }
    .toast.show { opacity: 1; }

    @media print {
      body { background: #fff; padding: 0; }
      .wrapper { max-width: 100%; }
      .receipt { box-shadow: none; border-radius: 0; }
      .actions, .firma-section, .btn-clear, .btn-confirm { display: none !important; }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div id="mainContent">
      <div class="receipt">
        <div style="text-align:center;padding:60px 20px;color:#6b7280;">
          <div style="font-size:2rem;margin-bottom:8px;">⏳</div>
          <p>Cargando recibo...</p>
        </div>
      </div>
    </div>
  </div>
  <div class="toast" id="toast"></div>

  <script>
    // ── Firebase ────────────────────────────────────────────────
    const firebaseConfig = {
      apiKey: "AIzaSyBW_BIFxoAjsppToJ-MyC8F4_LaoA6dVJM",
      authDomain: "taller-mecanico-erick.firebaseapp.com",
      projectId: "taller-mecanico-erick",
      storageBucket: "taller-mecanico-erick.firebasestorage.app",
      messagingSenderId: "925938033085",
      appId: "1:925938033085:web:fb9f085c290067a22c32d4"
    };
    let fdb;
    try {
      firebase.initializeApp(firebaseConfig);
      fdb = firebase.firestore();
    } catch(e) {}

    // ── Helpers ─────────────────────────────────────────────────
    function showToast(msg, duration = 3000) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), duration);
    }

    function getHashData() {
      try {
        const hash = decodeURIComponent(location.hash.replace('#data=', ''));
        return JSON.parse(decodeURIComponent(escape(atob(hash))));
      } catch(e) { return null; }
    }

    function estadoClass(e) {
      if (e === 'En diagnóstico') return 'status-diag';
      if (e === 'En reparación')  return 'status-rep';
      if (e === 'Listo')          return 'status-listo';
      return 'status-entr';
    }

    function fmt(v) { return v || '—'; }

    // ── Signature canvas ────────────────────────────────────────
    let sigCanvas, sigCtx, drawing = false, hasSig = false;

    function initCanvas() {
      sigCanvas = document.getElementById('sigCanvas');
      if (!sigCanvas) return;
      sigCtx = sigCanvas.getContext('2d');

      // Scale canvas to actual pixel size
      const rect = sigCanvas.getBoundingClientRect();
      sigCanvas.width  = rect.width  * window.devicePixelRatio;
      sigCanvas.height = rect.height * window.devicePixelRatio;
      sigCtx.scale(window.devicePixelRatio, window.devicePixelRatio);
      sigCtx.strokeStyle = '#1e293b';
      sigCtx.lineWidth = 2.5;
      sigCtx.lineCap = 'round';
      sigCtx.lineJoin = 'round';

      function pos(e) {
        const r = sigCanvas.getBoundingClientRect();
        const src = e.touches ? e.touches[0] : e;
        return { x: src.clientX - r.left, y: src.clientY - r.top };
      }

      sigCanvas.addEventListener('mousedown',  e => { drawing = true; const p = pos(e); sigCtx.beginPath(); sigCtx.moveTo(p.x, p.y); sigCanvas.classList.add('active-sig'); });
      sigCanvas.addEventListener('mousemove',  e => { if (!drawing) return; const p = pos(e); sigCtx.lineTo(p.x, p.y); sigCtx.stroke(); hasSig = true; });
      sigCanvas.addEventListener('mouseup',    () => { drawing = false; });
      sigCanvas.addEventListener('mouseleave', () => { drawing = false; });

      sigCanvas.addEventListener('touchstart', e => { e.preventDefault(); drawing = true; const p = pos(e); sigCtx.beginPath(); sigCtx.moveTo(p.x, p.y); sigCanvas.classList.add('active-sig'); }, { passive: false });
      sigCanvas.addEventListener('touchmove',  e => { e.preventDefault(); if (!drawing) return; const p = pos(e); sigCtx.lineTo(p.x, p.y); sigCtx.stroke(); hasSig = true; }, { passive: false });
      sigCanvas.addEventListener('touchend',   () => { drawing = false; });
    }

    function clearSig() {
      if (!sigCtx) return;
      sigCtx.clearRect(0, 0, sigCanvas.width, sigCanvas.height);
      hasSig = false;
      sigCanvas.classList.remove('active-sig');
    }

    // ── Save signature to Firestore ─────────────────────────────
    let _saving = false;
    async function confirmarFirma(docId) {
      if (_saving) return;
      if (!hasSig) { showToast('✏️ Por favor dibuja tu firma antes de confirmar'); return; }
      if (!docId)  { showToast('❌ No se puede guardar: ID de ingreso no encontrado'); return; }

      _saving = true;
      const btn = document.getElementById('btnConfirmarFirma');
      if (btn) { btn.disabled = true; btn.textContent = '⏳ Guardando...'; }

      try {
        const sigData = sigCanvas.toDataURL('image/png');
        await fdb.collection('computadoras').doc(docId).update({
          firmaCliente:  sigData,
          firmaAceptada: true,
          firmaFecha:    firebase.firestore.FieldValue.serverTimestamp()
        });

        // Show signed state
        document.getElementById('firmaArea').innerHTML = `
          <div class="signed-badge">
            <div class="icon">✅</div>
            <div class="text">Términos aceptados y recibo firmado<br>
              <span style="font-weight:400;font-size:.75rem;">Tu firma fue guardada correctamente.</span>
            </div>
          </div>
          <img id="firmaPreview" src="${sigData}" style="display:block;margin-top:12px;border:1px solid #bbf7d0;border-radius:8px;max-width:100%;background:#fff;">
        `;
        showToast('✅ Firma guardada correctamente', 4000);
      } catch(e) {
        if (btn) { btn.disabled = false; btn.textContent = '✅ Confirmar Firma y Aceptar Cláusulas'; }
        showToast('❌ Error al guardar: ' + e.message, 5000);
      } finally {
        _saving = false;
      }
    }

    // ── Render receipt ──────────────────────────────────────────
    function render(d) {
      const precio    = d.precio ? `L. ${parseFloat(d.precio).toLocaleString('es-HN', {minimumFractionDigits:2})}` : 'Por definir';
      const vehiculo  = [d.marca, d.modelo, d.ano].filter(Boolean).join(' ') || '—';
      const docId     = d.id || '';

      document.getElementById('mainContent').innerHTML = `
        <div class="receipt">
          <div class="header">
            <div class="logo">⚡</div>
            <h1>YONKER EL TRIANGULO</h1>
            <h2>Reparación de Computadoras Automotrices</h2>
            <div class="folio">Folio: ${d.folio} &nbsp;|&nbsp; ${d.fecha}</div>
          </div>

          <div class="status-bar ${estadoClass(d.estado)}">Estado actual: ${fmt(d.estado)}</div>

          <div class="section">
            <div class="section-title">Información del Cliente</div>
            <div class="field"><span class="lbl">Nombre</span><span class="val">${fmt(d.cliente)}</span></div>
            <div class="field"><span class="lbl">Teléfono</span><span class="val">${fmt(d.tel)}</span></div>
            ${d.email ? `<div class="field"><span class="lbl">Email</span><span class="val">${d.email}</span></div>` : ''}
          </div>

          <div class="section">
            <div class="section-title">Detalles del Módulo</div>
            <div class="field"><span class="lbl">Tipo</span><span class="val">${fmt(d.tipo)}</span></div>
            <div class="field"><span class="lbl">N° de Parte</span><span class="val">${fmt(d.parte)}</span></div>
            <div class="field"><span class="lbl">Vehículo</span><span class="val">${vehiculo}</span></div>
            ${d.vin ? `<div class="field"><span class="lbl">VIN</span><span class="val">${d.vin}</span></div>` : ''}
            <div class="field"><span class="lbl">¿Viene abierta?</span><span class="val">${d.abierta === 'SI' ? '✅ Sí' : '❌ No'}</span></div>
          </div>

          ${d.falla ? `<div class="section"><div class="section-title">Descripción de Falla</div><p style="font-size:.84rem;color:#374151;line-height:1.6;padding:6px 0;">${d.falla}</p></div>` : ''}
          ${d.obs   ? `<div class="section"><div class="section-title">Observaciones</div><p style="font-size:.84rem;color:#374151;line-height:1.6;padding:6px 0;">${d.obs}</p></div>` : ''}

          <div class="price-box">
            <span class="lbl">💰 Precio de Diagnóstico</span>
            <span class="val">${precio}</span>
          </div>

          <div class="footer">
            Atendido por: ${fmt(d.tecnico)} &nbsp;|&nbsp; Comprobante de recepción de módulo electrónico
          </div>
        </div>

        <!-- CLÁUSULAS -->
        <div class="clausulas">
          <div class="clausulas-title">⚠️ Términos y Condiciones del Servicio</div>
          <div class="clausula">
            <div class="num">1</div>
            <div>El <strong>costo del diagnóstico NO se descuenta</strong> del precio final de reparación. Son cobros independientes.</div>
          </div>
          <div class="clausula">
            <div class="num">2</div>
            <div>El <strong>diagnóstico es obligatorio</strong> para todo equipo ingresado. No se puede omitir ni negociar.</div>
          </div>
          <div class="clausula">
            <div class="num">3</div>
            <div>Los equipos se <strong>atienden por orden de llegada</strong>. No existen preferencias ni saltos de turno.</div>
          </div>
          <div class="clausula">
            <div class="num">4</div>
            <div><strong>No existe fecha fija de entrega.</strong> El tiempo depende del diagnóstico, disponibilidad de repuestos y carga de trabajo.</div>
          </div>
          <div class="clausula">
            <div class="num">5</div>
            <div>Una vez emitido este recibo, el <strong>pago del diagnóstico es obligatorio</strong>, independientemente de que el cliente decida no reparar el equipo.</div>
          </div>
        </div>

        <!-- FIRMA DIGITAL -->
        <div class="firma-section" id="firmaSection">
          <div class="firma-title">✍️ Firma Digital del Cliente</div>
          <div class="firma-subtitle">Al firmar, confirmas que leíste y aceptas todos los términos y condiciones descritos arriba.</div>
          <div id="firmaArea">
            <canvas id="sigCanvas"></canvas>
            <div class="sig-actions">
              <button class="btn-clear" onclick="clearSig()">🗑️ Borrar</button>
              <button class="btn-confirm" id="btnConfirmarFirma" onclick="confirmarFirma('${docId}')">✅ Confirmar Firma y Aceptar Cláusulas</button>
            </div>
          </div>
        </div>

        <div class="actions" id="actionBtns">
          <button class="btn-print" onclick="window.print()">🖨️ Imprimir</button>
          <button class="btn-wa" onclick="compartirWa()">💬 WhatsApp</button>
        </div>
      `;

      initCanvas();

      // If already signed, check Firestore for the signature
      if (docId && fdb) {
        fdb.collection('computadoras').doc(docId).get().then(doc => {
          if (doc.exists && doc.data().firmaAceptada) {
            const firma = doc.data().firmaCliente || '';
            document.getElementById('firmaArea').innerHTML = `
              <div class="signed-badge">
                <div class="icon">✅</div>
                <div class="text">Este recibo ya fue firmado y aceptado<br>
                  <span style="font-weight:400;font-size:.75rem;">Los términos fueron aceptados por el cliente.</span>
                </div>
              </div>
              ${firma ? `<img src="${firma}" style="display:block;margin-top:12px;border:1px solid #bbf7d0;border-radius:8px;max-width:100%;background:#fff;">` : ''}
            `;
            document.getElementById('firmaSection').classList.add('signed');
          }
        }).catch(() => {});
      }

      window.compartirWa = function() {
        const msg = `Hola ${d.cliente || ''}, aquí está tu recibo de YONKER EL TRIANGULO 🧾\n\nPuedes verlo y firmarlo aquí:\n${location.href}`;
        window.open('https://api.whatsapp.com/send?text=' + encodeURIComponent(msg), '_blank');
      };
    }

    // ── Init ─────────────────────────────────────────────────────
    const data = getHashData();
    if (data) {
      render(data);
    } else {
      document.getElementById('mainContent').innerHTML = `
        <div class="error-box">
          <div class="icon">❌</div>
          <p><strong>Recibo no encontrado</strong></p>
          <p style="margin-top:8px;font-size:.85rem;color:#6b7280;">El enlace no es válido o los datos están incompletos.</p>
        </div>`;
    }
  </script>
</body>
</html>
